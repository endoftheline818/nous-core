services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: nous-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /mnt/nous-data/qdrant/storage:/qdrant/storage
      - /mnt/nous-data/qdrant/snapshots:/qdrant/snapshots
    environment:
      - RUN_MODE=production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 sh -c '(echo > /dev/tcp/127.0.0.1/6333) 2>/dev/null' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: nous-searxng
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/nous-data/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://192.168.1.87:8080/
      - SEARXNG_PORT=8080
      - SEARXNG_BIND_ADDRESS=127.0.0.1
